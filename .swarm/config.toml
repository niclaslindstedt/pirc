# Swarm Configuration
#
# Centralized configuration for the Swarm CLI. All settings for this project
# live here. See .swarm/README.md for the full reference.
#
# Configuration is loaded in this order (later overrides earlier):
#   1. Built-in defaults
#   2. This file
#   3. Workflow-specific defaults (from process.toml [metadata])
#   4. Environment variables (highest priority)
#
# Environment variable references use the format: "env:VAR_NAME"
# Example: connection_string = "env:DATABASE_URL"

# ---------------------------------------------------------------------------
# Project Identity
# ---------------------------------------------------------------------------

# Project name - used for Docker labels, container naming, and display.
project_name = "pirc"

# Unique instance ID - generated at init. Used for Docker container/volume
# naming to allow multiple Swarm projects on the same machine.
# Do not change unless recreating containers.
instance_id = "e63b3e3e"

# Active workflow - determines which definitions, roles, skills, actions,
# and process rules to use. Available built-in workflows: software, softwarev2,
# legal, story. Can be overridden per-run with --workflow flag.
workflow_name = "software"

# ---------------------------------------------------------------------------
# [agent] - AI Agent Configuration (Claude Code)
# ---------------------------------------------------------------------------

[agent]
# Model profile override. If set, uses this model for all actions unless
# the action itself specifies a different model in process.toml.
# Examples: "opus", "sonnet", "haiku"
# If not set, uses the workflow's default model or the agent's default.
# model = "opus"

# Unsafe mode - when true, the agent can write files without permission prompts.
# Recommended for automated workflows where human approval isn't needed.
# Env override: SWARM_AGENT_UNSAFE
unsafe_mode = true

# Additional CLI arguments passed to the agent on every invocation.
# Example: extra_args = ["--verbose", "--max-turns", "50"]
extra_args = []

# Custom CLI command path (optional).
# Use if the claude binary is not on PATH or has a non-standard name.
# cli_path = "/usr/local/bin/claude"

# ---------------------------------------------------------------------------
# [database] - Connection Pool Settings
# ---------------------------------------------------------------------------

[database]
# Maximum number of connections in the pool.
# Range: 1-1000. Default: 10.
# Env override: SWARM_DB_MAX_CONNECTIONS
max_connections = 10

# How long to wait (seconds) for a connection before timing out.
# Must be > 0. Default: 30.
# Env override: SWARM_DB_CONNECTION_TIMEOUT
connection_timeout_seconds = 30

# How long an idle connection stays in the pool before being closed.
# Must be > 0. Default: 600 (10 minutes).
# Env override: SWARM_DB_IDLE_TIMEOUT
idle_timeout_seconds = 600

# ---------------------------------------------------------------------------
# [vendor.postgres] - PostgreSQL Connection
# ---------------------------------------------------------------------------

[vendor]

[vendor.postgres]
# PostgreSQL connection string. Each project uses a unique port to allow
# multiple Swarm projects on the same machine.
# Format: postgresql://user:password@host:port/database
connection_string = "postgresql://swarm:swarm@localhost:58000/swarm"

# For production or shared environments, read from an environment variable:
# connection_string = "env:DATABASE_URL"

# ---------------------------------------------------------------------------
# [process] - Workflow Execution Settings
# ---------------------------------------------------------------------------

[process]
# Default git branch for change requests and merge operations.
# Env override: SWARM_DEFAULT_BRANCH
default_branch = "main"

# Automatically push commits to the remote after creation.
# Env override: SWARM_AUTO_PUSH
auto_push = false

# Automatically create a change request after completing an iteration.
# Env override: SWARM_AUTO_CREATE_CR
auto_create_cr = false

# Maximum number of iterations to keep in history per project.
# Must be > 0. Default: 100.
# Env override: SWARM_MAX_ITERATION_HISTORY
max_iteration_history = 100

# Minutes to pause between workflow steps. Useful for rate limiting.
# 0 = no pause (default).
# Env override: SWARM_COFFEE_BREAK_MINUTES
coffee_break_minutes = 0

# Maximum times the same action can run consecutively before stopping.
# Prevents infinite loops when the workflow gets stuck. Default: 2.
# Set to 0 to disable this safety check.
# Env override: SWARM_MAX_CONSECUTIVE_ACTION_RUNS
# max_consecutive_action_runs = 2

# ---------------------------------------------------------------------------
# [git] - Git Integration
# ---------------------------------------------------------------------------

[git]
# Commit message template. Available placeholders:
#   {{title}}     - Ticket title (most common)
#   {{iteration}} - Current iteration name
#   {{ticket_id}} - Ticket ID (e.g., T001)
commit_message_template = "{{title}}"

# Sign commits with GPG. Requires GPG to be configured.
# Env override: SWARM_SIGN_COMMITS
sign_commits = false

# Require linear git history (no merge commits).
# Env override: SWARM_REQUIRE_LINEAR_HISTORY
require_linear_history = false

# Default merge method when approving change requests.
# Valid values: "merge", "squash", "rebase". Default: "squash".
# Env override: SWARM_DEFAULT_MERGE_METHOD
default_merge_method = "squash"

# ---------------------------------------------------------------------------
# [paths] - Directory Layout
# ---------------------------------------------------------------------------

[paths]
# All paths are relative to the project root. Must not start with /.
# Env overrides: SWARM_DIR, SWARM_ACTIONS_DIR, SWARM_ROLES_DIR

# Base directory for all Swarm data.
swarm_dir = ".swarm"

# Subdirectories (relative to swarm_dir):
actions_dir = "actions"
roles_dir = "roles"

# ---------------------------------------------------------------------------
# [templates] - Template Engine
# ---------------------------------------------------------------------------

[templates]
# Allow bash command execution in templates via {{!command}} syntax.
# Disable for security in untrusted environments.
enable_command_execution = true

# Maximum seconds a template command can run before being killed.
# Must be > 0. Default: 30.
command_timeout = 30

# ---------------------------------------------------------------------------
# [console] - Output Appearance (optional)
# ---------------------------------------------------------------------------
# Uncomment to customize CLI output appearance.
#
# [console]
# # Primary accent color for highlights, spinners, and headers.
# # Valid: orange, blue, green, cyan, magenta, yellow, red, white
# # Env override: SWARM_ACCENT_COLOR
# accent_color = "orange"
#
# # Secondary color for less prominent elements.
# secondary_color = "white"
#
# # Enable animated spinners for long-running operations.
# # Env override: SWARM_SPINNERS_ENABLED
# spinners_enabled = true
#
# # Use unicode characters in output.
# unicode_enabled = true
#
# # Enable colored output. Set to false for CI/log files.
# # Env overrides: SWARM_COLORS_ENABLED or NO_COLOR (any value disables)
# colors_enabled = true
#
# # Minimum milliseconds before showing a spinner.
# spinner_delay_ms = 100

# ---------------------------------------------------------------------------
# [workflow] - Workflow Feature Toggles (optional)
# ---------------------------------------------------------------------------
# Uncomment to control workflow-specific behavior.
#
# [workflow]
# # Show priority field for EPICs. Set false to hide priority column.
# # Env override: SWARM_ENABLE_EPIC_PRIORITY
# enable_epic_priority = true
#
# # Show priority field for TICKETs. Set false to hide priority column.
# # Env override: SWARM_ENABLE_TICKET_PRIORITY
# enable_ticket_priority = true

# ---------------------------------------------------------------------------
# [commit_hooks] - Git Commit Hooks (optional)
# ---------------------------------------------------------------------------
# Run custom commands before and after git commits created by Swarm.
#
# [commit_hooks]
# pre = [
#     "cargo fmt --check",
#     "cargo clippy -- -D warnings"
# ]
# post = [
#     "echo 'Commit created successfully'",
#     "git log -1 --oneline"
# ]
