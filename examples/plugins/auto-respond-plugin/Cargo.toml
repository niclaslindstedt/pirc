[package]
name = "auto-respond-plugin"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
description = "An example plugin for pirc demonstrating event hooks and configuration reading"

# Build as a C dynamic library so the pirc plugin host can load it at runtime.
[lib]
crate-type = ["cdylib"]

[dependencies]
pirc-plugin = { path = "../../../pirc-plugin" }

# Cannot inherit workspace lints because cdylib plugins need `unsafe-code`
# for the FFI entry point generated by `declare_plugin!`, and Cargo does not
# allow overriding individual workspace lints.  Replicate the workspace lint
# settings here with `unsafe-code` changed to "allow".
[lints.clippy]
all = { level = "deny", priority = -1 }
pedantic = { level = "warn", priority = -1 }
module-name-repetitions = "allow"
must-use-candidate = "allow"
missing-errors-doc = "allow"
missing-panics-doc = "allow"

[lints.rust]
unsafe-code = "allow"
